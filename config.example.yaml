# config.example.yaml — DrBrain configuration template
#
# Copy this file to config.yaml and edit, or run `drbrain setup` to generate
# config.local.yaml interactively.  Priority: config.local.yaml > config.yaml > env vars.
#
# Secret values (API keys, tokens) should go in config.local.yaml (gitignored),
# NOT in config.yaml.  Use "${ENV_VAR}" syntax to pull from environment.

# ── LLM Models ──────────────────────────────────────────────────
# First model in the list is primary; others serve as fallback chain.
# Uncomment the provider(s) you need.  All providers supported by litellm work.
llm:
  models:
    # ── OpenAI ──
    - provider: openai
      model: gpt-4o # gpt-4o / gpt-4.1 / gpt-4.1-mini / o4-mini
      api_key: "${OPENAI_API_KEY}" # https://platform.openai.com/api-keys
      base_url: null # null = default, or https://api.openai.com/v1
    # ── Anthropic (Claude) ──
    # - provider: anthropic
    #   model: claude-sonnet-4-6     # claude-opus-4-7 / claude-sonnet-4-6 / claude-haiku-4-5
    #   api_key: "${ANTHROPIC_API_KEY}"  # https://console.anthropic.com/keys
    #   base_url: null

    # ── DeepSeek ──
    # - provider: openai             # DeepSeek uses OpenAI-compatible API
    #   model: deepseek-v4-pro       # deepseek-v4-pro / deepseek-v4-flash
    #   api_key: "${DEEPSEEK_API_KEY}"   # https://platform.deepseek.com/api_keys
    #   base_url: "https://api.deepseek.com"

    # ── Zhipu (智谱 / GLM) ──
    # - provider: openai             # Zhipu uses OpenAI-compatible API
    #   model: glm-4.5               # glm-4.5 / glm-4 / glm-4-flash
    #   api_key: "${ZHIPU_API_KEY}"  # https://open.bigmodel.cn/
    #   base_url: "https://open.bigmodel.cn/api/paas/v4"

    # ── Bailian (阿里云百炼 / Qwen) ──
    # - provider: openai             # Bailian uses OpenAI-compatible API
    #   model: qwen3-235b-a22b       # qwen3-235b-a22b / qwen-max / qwen-plus
    #   api_key: "${BAILIAN_API_KEY}"    # https://bailian.console.aliyun.com/
    #   base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

    # ── MiniMax ──
    # - provider: openai             # MiniMax uses OpenAI-compatible API
    #   model: minimax-m2.1          # minimax-m2.1 / minimax-m1
    #   api_key: "${MINIMAX_API_KEY}"    # https://platform.minimaxi.com/
    #   base_url: "https://api.minimax.chat/v1"

    # ── Moonshot (月之暗面 / Kimi) ──
    # - provider: openai             # Moonshot uses OpenAI-compatible API
    #   model: kimi-k2               # kimi-k2 / moonshot-v1-8k
    #   api_key: "${MOONSHOT_API_KEY}"   # https://platform.moonshot.cn/
    #   base_url: "https://api.moonshot.cn/v1"

    # ── Ollama (local) ──
    # - provider: ollama
    #   model: qwen2.5:7b            # any model you have pulled: ollama pull <model>
    #   api_key: null                # not needed for local Ollama
    #   base_url: "http://localhost:11434"

    # ── vLLM / SGLang / LocalAI (self-hosted) ──
    # - provider: openai             # any OpenAI-compatible server
    #   model: meta-llama/Llama-4-Scout-17B-16E-Instruct
    #   api_key: "not-needed"        # usually not needed for self-hosted
    #   base_url: "http://localhost:8000/v1"

    # ── PDF Parser ───────────────────────────────────────────────────
    # Primary: MinerU API (high quality). Fallback: PyMuPDF (always available).
mineru:
  token: "${MINERU_TOKEN}" # free: leave empty. token-tier: https://mineru.net/apiManage/token
  model: "vlm" # pipeline | vlm | MinerU-HTML
  is_ocr: false # enable OCR extraction
  enable_formula: true # parse LaTeX formulas
  enable_table: true # parse tables
  max_pages: 150 # split threshold for large PDFs (MinerU limit: 200)

# ── Database ─────────────────────────────────────────────────────
db:
  path: "data/drbrain.db"

# ── Data Directories ─────────────────────────────────────────────
dirs:
  inbox: "data/spool/inbox" # PDFs awaiting ingest
  pending: "data/spool/pending" # failed ingest PDFs
  papers: "data/papers" # per-paper directories (after ingest)
  reports: "data/reports" # JSON analysis reports
  cache: "data/cache" # API response cache (rebuildable)
  logs: "data/logs" # validation.log + app logs

# ── External APIs ────────────────────────────────────────────────
api:
  deepxiv_token: "${DEEPXIV_TOKEN}" # register at https://data.rag.ac.cn/register
  s2_rate_limit: 100 # Semantic Scholar requests/minute
  s2_api_key: "" # Semantic Scholar API key — https://www.semanticscholar.org/product/api
  cache_ttl: 86400 # API cache TTL in seconds (24h)
  crossref_email: "${CROSSREF_EMAIL}" # optional, for polite pool
  openalex_token: "${OPENALEX_TOKEN}" # optional, for higher rate limits

# ── Search ───────────────────────────────────────────────────────
bm25:
  k1: 1.5 # term frequency saturation (0.5-2.0)
  b: 0.75 # document length normalization (0-1)

# ── Extraction ───────────────────────────────────────────────────
extract:
  max_concurrent: 10 # parallel LLM calls during concept extraction

# ── Quality Control ──────────────────────────────────────────────
queue:
  weak_threshold: 0.7 # confidence below this → review queue
  auto_accept: 0.9 # confidence above this → auto-accept
