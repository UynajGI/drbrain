# config.yaml — DrBrain base configuration
# Override values in config.local.yaml (gitignored, generated by `drbrain setup`)
# See config.example.yaml for all available options and provider templates.
#
# Use "${ENV_VAR}" syntax to pull values from environment variables.

llm:
  models:
    - provider: openai
      model: gpt-4o
      api_key: "${OPENAI_API_KEY}"
      base_url: null

mineru:
  token: "${MINERU_TOKEN}"
  model: "vlm"
  is_ocr: false
  enable_formula: true
  enable_table: true
  max_pages: 150

db:
  path: "data/drbrain.db"

dirs:
  inbox: "data/spool/inbox"
  pending: "data/spool/pending"
  papers: "data/papers"
  reports: "data/reports"
  cache: "data/cache"
  logs: "data/logs"

api:
  s2_rate_limit: 100
  s2_api_key: "${S2_API_KEY}"
  cache_ttl: 86400
  crossref_email: "${CROSSREF_EMAIL}"
  openalex_token: "${OPENALEX_TOKEN}"

bm25:
  k1: 1.5
  b: 0.75

extract:
  max_concurrent: 10  # parallel LLM calls during concept extraction

queue:
  weak_threshold: 0.7
  auto_accept: 0.9
