publisher: Yuunagi
repo: UynajGI/DrBrain
description: "Academic knowledge graph skills for AI agents — research analysis, paper ingest, literature query, citation tracking, and workspace management. Built for DrBrain."
keywords:
  - academic
  - research
  - knowledge-graph
  - literature
  - citations
  - papers
  - symbol-driven
  - bm25
  - knowledge-frontier

skills:
  - name: drbrain/research-analysis
    path: skills/research-analysis
    description: "Knowledge frontier analysis — detect research seeds, causal chains, hypotheses, and cross-domain isomorphism"

  - name: drbrain/paper-ingest
    path: skills/paper-ingest
    description: "Ingest PDFs into the knowledge graph — MinerU parsing, 5-source cross-validation, tree structuring"

  - name: drbrain/paper-query
    path: skills/paper-query
    description: "Query papers via BM25 search with graph-enhanced hybrid ranking and neighbor traversal"

  - name: drbrain/citation-tracking
    path: skills/citation-tracking
    description: "Citation graph analysis — shared-reference detection, citation verification, multi-source expansion"

  - name: drbrain/workspace-analysis
    path: skills/workspace-analysis
    description: "Manage paper workspaces — create subsets, cross-paper concept analysis, export BibTeX/RIS/Markdown"

  - name: drbrain/show
    path: skills/show
    description: "View paper at any depth — metadata, concepts by type, arguments, and knowledge graph edges"

  - name: drbrain/export
    path: skills/export
    description: "Export papers to BibTeX, RIS, or Markdown — single paper, all papers, or workspace-scoped"

  - name: drbrain/audit
    path: skills/audit
    description: "Data quality scan across the entire library — 15 rules at error, warning, and info severity"

  - name: drbrain/translate
    path: skills/translate
    description: "Translate paper markdown via LLM — placeholder-protected chunking with resume from interruption"

  - name: drbrain/graph
    path: skills/graph
    description: "Knowledge graph operations — traverse neighbors, find shortest paths, cross-paper concept analysis"

  - name: drbrain/import
    path: skills/import
    description: "Import papers from Zotero (local/Web API), BibTeX .bib files, and Endnote .xml/.ris exports"

  - name: drbrain/index
    path: skills/index
    description: "Rebuild the BM25 search index — run after ingest/build when search results are stale"
